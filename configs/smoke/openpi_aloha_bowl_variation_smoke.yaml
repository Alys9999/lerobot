policy:
  transport: websocket
  endpoint: ws://127.0.0.1:8000
  timeout_s: 10.0

policy_spec:
  model_id: openpi_jax_pi05_aloha
  env_type: aloha
  robot_id: aloha
  embodiment_id: aloha
  backend_id: gym_aloha
  packet_image_keys:
    cam_high: observation.images.image
  remote_image_keys:
    cam_high: cam_high
  state_observation_key: observation.state
  state_packet_key: state
  state_remote_key: state
  state_dim: 14
  remote_image_container_key: images
  remote_image_layout: chw
  prompt_required: false
  action_space: env_native_7d
  action_dim: 7
  action_horizon: 50
  server_action_dim: 14
  output_action_indices: [0, 1, 2, 3, 4, 5, 6]

env:
  type: libero
  task: libero_spatial
  task_ids: [0]
  obs_type: pixels_agent_pos
  camera_name: agentview_image,robot0_eye_in_hand_image
  camera_name_mapping:
    agentview_image: image
    robot0_eye_in_hand_image: image2
  init_states: true
  autoreset_on_done: false

observation:
  image_flip: true
  state_components:
    - eef_pos
    - joints_pos
    - gripper_qpos
    - gripper_qvel

variation:
  enabled: true
  seed: 123
  variables:
    object_friction:
      enabled: true
      target: bowl
      range: [0.38, 0.38]
    finger_friction:
      enabled: true
      target: gripper_fingers
      range: [0.38, 0.38]
    object_weight:
      enabled: true
      target: bowl
      range: [0.05, 0.4]

runtime:
  n_episodes: 1
  max_steps: 400
  write_trace: true
  write_video: true
  output_dir: outputs/openpi_aloha_bowl_smoke
  fail_fast: true
