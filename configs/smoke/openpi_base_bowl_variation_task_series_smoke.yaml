policy:
  transport: websocket
  endpoint: ws://127.0.0.1:8000
  timeout_s: 10.0

policy_spec:
  model_id: openpi_jax_pi05_base
  env_type: libero
  robot_id: franka_panda
  embodiment_id: libero
  backend_id: mujoco
  packet_image_keys:
    third_person: observation.images.image
    left_wrist: observation.images.image2
  remote_image_keys:
    third_person: observation/image
    left_wrist: observation/wrist_image
  state_observation_key: observation.state
  state_packet_key: libero_state_8d
  state_remote_key: observation/state
  state_dim: 8
  action_space: env_native_7d
  action_dim: 7
  action_horizon: 10

env:
  type: libero
  task: libero_spatial
  task_ids: [0, 1, 2]
  obs_type: pixels_agent_pos
  camera_name: agentview_image,robot0_eye_in_hand_image
  camera_name_mapping:
    agentview_image: image
    robot0_eye_in_hand_image: image2
  init_states: true
  autoreset_on_done: false

observation:
  image_flip: true
  state_components:
    - eef_pos
    - eef_axis_angle
    - gripper_qpos

variation:
  enabled: true
  seed: 123
  variables:
    object_friction:
      enabled: true
      target: bowl
      range: [0.38, 0.38]
    finger_friction:
      enabled: true
      target: gripper_fingers
      range: [0.38, 0.38]
    object_weight:
      enabled: true
      target: bowl
      range: [0.05, 0.4]

runtime:
  n_episodes: 1
  max_steps: 400
  write_trace: true
  write_video: false
  output_dir: outputs/openpi_base_bowl_task_series_smoke
  fail_fast: true
