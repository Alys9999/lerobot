policy:
  transport: websocket
  endpoint: ws://127.0.0.1:8000
  timeout_s: 10.0

env:
  task: libero_spatial
  task_ids: [0]
  obs_type: pixels_agent_pos
  camera_name: agentview_image,robot0_eye_in_hand_image
  init_states: true
  autoreset_on_done: false

variation:
  enabled: true
  seed: 123
  variables:
    object_friction:
      enabled: true
      target: bowl
      range: [0.15, 1.2]
    finger_friction:
      enabled: true
      target: gripper_fingers
      range: [0.3, 1.5]
    object_weight:
      enabled: true
      target: bowl
      range: [0.05, 0.4]

runtime:
  n_episodes: 1
  max_steps: 120
  write_trace: true
  write_video: true
  output_dir: outputs/openpi_bowl_smoke
  fail_fast: true
